name: lint

on:
  push:
    branches:
      - v6
  pull_request:
    branches:
      - v6

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
